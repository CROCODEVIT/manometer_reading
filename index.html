<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINOMAN - LOGIN</title>
    <link rel="stylesheet" href="https://manoapp.trisakti.dev/assets/css/login_style.css">
    <!-- <link rel="stylesheet" href="assets/css/login_style.css"> -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p>Sedang memproses...</p>
    </div>

    <div class="login-container">
        <div class="logo-area">
            <h1>LOGIN</h1>
            <p>MANOMETER READING</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>
        <button type="submit" class="btn-setting" onclick="openModal('Setting IP Server')">SET API</button>

        <p class="footer-text">&copy; 2026 Crocodev</p>
    </div>

    <div id="modalApp" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
            <h3 id="modalTitle">Konfirmasi</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
            <input type="text" id="ip_server" class="input-minimalis" placeholder="Contoh: 192.168.1.10">
            <span class="hidden" id="ip_empty"><small class="text-danger">IP/Host Name harus di isi !</small></span>
            </div>
            <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">Batal</button>
            <button class="btn-primary" id="btnConfirm"  onclick="saveURL()">Simpan</button>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
 <script>
   const dbName = "manoApp";

// Fungsi untuk inisialisasi IndexedDB
function initDB() {
    return new Promise((resolve, reject) => {
        // Versi dinaikkan ke 2 jika sebelumnya sudah ada versi 1 untuk memicu onupgradeneeded
        const request = indexedDB.open("manoApp", 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            
            // Nama Object Store disesuaikan dengan konteks Manometer
            if (!db.objectStoreNames.contains("pembacaan_manometer")) {
                
                // Primary key menggunakan 'id_periode' sesuai gambar
                const store = db.createObjectStore("pembacaan_manometer", { 
                    keyPath: "id_pembacaan", 
                    autoIncrement: true 
                });

                // Index untuk mempermudah pencarian berdasarkan kolom penting di gambar
                store.createIndex("id_manometer", "id_manometer", { unique: false });
                store.createIndex("tgl_baca", "tgl_baca", { unique: false });
                store.createIndex("pressure", "pressure", { unique: false });
                store.createIndex("nik", "nik", { unique: false });
                store.createIndex("operator", "operator", { unique: false });
                store.createIndex("kondisi_baca", "kondisi_baca", { unique: false });
                store.createIndex("status_baca", "status_baca", { unique: false });
                store.createIndex("status_masa", "status_masa", { unique: false });
                store.createIndex("code_trx", "code_trx", { unique: false });
                // Tetap menyertakan index status_sync untuk keperluan sinkronisasi data offline ke server
                // 0 = belum upload, 1 = sudah upload
                store.createIndex("status_sync", "status_sync", { unique: false });
            }

             // Nama Object Store disesuaikan dengan konteks Manometer
            if (!db.objectStoreNames.contains("daftar_baca")) {
                
                // Primary key menggunakan 'id_periode' sesuai gambar
                const store = db.createObjectStore("daftar_baca", { 
                    keyPath: "id", 
                    autoIncrement: true 
                });

                // Index untuk mempermudah pencarian berdasarkan kolom penting di gambar
                store.createIndex("id_manometer", "id_manometer", { unique: true });
                store.createIndex("id_zona", "id_zona", { unique: false });
                store.createIndex("nama_zona", "nama_zona", { unique: false });
                store.createIndex("id_dma", "id_dma", { unique: false });
                store.createIndex("nama_dma", "nama_dma", { unique: false });
                store.createIndex("kode_manometer", "kode_manometer", { unique: false });
                store.createIndex("manometer", "manometer", { unique: false });
                store.createIndex("diameter", "diameter", { unique: false });
                store.createIndex("longitude", "longitude", { unique: false });
                store.createIndex("latitude", "latitude", { unique: false });
                
            }
        };

        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject("Gagal membuka IndexedDB: " + event.target.error);
    });
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const ip_server = localStorage.getItem('ip_server');

    if(!ip_server){
        alert("IP Server Belum di setting");
    } else {
        $.ajax({
            url: ip_server + "/Services/auth",
            type: 'POST',
            dataType: 'json',
            data: {
                user: user,
                pass: pass
            },
            beforeSend: function() {
                // TAMPILKAN LOADER
                $('#loader').removeClass('hidden');
            },
            success: function(data) {
                if(data.status === true){
                    initDB().then(() => {
                        console.log("Database berhasil disiapkan");
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('username', data.result["username"]);
                        localStorage.setItem('role_id', data.result["role_id"]);
                        localStorage.setItem('nik', data.result["nik"]);
                        window.location.href = 'main.html';
                    }).catch((err) => {
                        alert("Gagal menyiapkan database lokal: " + err);
                    });
                } else {
                    alert(data.message);
                }
            },
            error: function() {
                alert("Gagal terhubung ke server. Cek kembali koneksi atau IP Server.");
            },
            complete: function() {
                // SEMBUNYIKAN LOADER SETELAH SELESAI
                $('#loader').addClass('hidden');
            }
        });
    }
});

        function saveURL() {
            document.getElementById('ip_empty').classList.add('hidden');
            const ip_server = document.getElementById('ip_server').value;
                if(ip_server==""){
                    document.getElementById('ip_empty').classList.remove('hidden');
                }else{
                    document.getElementById('ip_empty').classList.add('hidden');
                    localStorage.setItem('ip_server', ip_server);
                    closeModal();
                }
        }

        // FUNGSI JAVASCRIPT UNTUK MODAL
        function openModal(title) {
            document.getElementById('modalTitle').innerText = title;
            $("#ip_server").val(localStorage.getItem("ip_server"));
            document.getElementById('modalApp').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalApp').classList.remove('show');
        }

    // Klik di luar modal untuk menutup
        window.onclick = function(event) {
            const modal = document.getElementById('modalApp');
            if (event.target == modal) {
                closeModal();
            }
        }

    $(document).ready(function() {
        // Mengambil string query dari URL (misal: ?login=error)
        const urlParams = new URLSearchParams(window.location.search);

        // Mengambil nilai dari parameter 'login'
        const statusLogin = urlParams.get('login');

        console.log(statusLogin); // Output: error

        // Contoh penggunaan dengan jQuery untuk menampilkan pesan
        if (statusLogin) {
            statusLogin === 'error'?alert('Silahkan login terlebih dahulu !'):""
        }
        });
    </script>
</html>
